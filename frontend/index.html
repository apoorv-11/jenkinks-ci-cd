<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Docker Tutorial</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #3b82f6;
    }

    header h1 {
      margin: 0;
      color: #3b82f6;
    }

    header p {
      margin-top: 6px;
      color: #94a3b8;
    }

    .container {
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 15px;
      margin-right: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .backend-box {
      background: #1e293b;
      border: 1px solid #3b82f6;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .backend-box h3 {
      margin-top: 0;
      color: #3b82f6;
    }

    .status-bar {
      padding: 12px;
      margin-top: 20px;
      border-radius: 6px;
      font-weight: bold;
      text-align: center;
      background: #334155;
      border: 1px solid #64748b;
    }

    .online {
      color: #22c55e;
    }

    .offline {
      color: #ef4444;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Docker Tutorial</h1>
    <p>Frontend & Backend Communication</p>
  </header>

  <div class="container">

    <button onclick="getData()">Get Data From Backend</button>
    <button onclick="checkStatus()">Check Backend Status</button>

    <div class="backend-box">
      <h3>Backend Response</h3>
      <p id="result">Waiting for backend response...</p>
    </div>

    <div class="status-bar" id="statusBar">
      Status: Unknown
    </div>

  </div>

  <footer>
    Built using Docker, Node.js & Nginx
  </footer>

  <script>
    function getData() {
      fetch("http://localhost:5000/api")
        .then(res => res.json())
        .then(data => {
          document.getElementById("result").innerText = data.message;
        })
        .catch(() => {
          document.getElementById("result").innerText =
            "Backend not reachable";
        });
    }

    function checkStatus() {
      fetch("http://localhost:5000/api")
        .then(res => {
          if (res.ok) {
            document.getElementById("statusBar").innerHTML =
              "Status: <span class='online'>Backend is ONLINE</span>";
          } else {
            throw new Error();
          }
        })
        .catch(() => {
          document.getElementById("statusBar").innerHTML =
            "Status: <span class='offline'>Backend is OFFLINE</span>";
        });
    }
  </script>
</body>
</html>
